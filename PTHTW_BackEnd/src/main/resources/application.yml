spring:
  application:
    name: backend

  data:
    web:
      pageable:
        max-page-size: 100

  # ===================================================================
  # 1. DATABASE CONNECTION CONFIGURATION
  # ===================================================================
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/research_management_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ===================================================================
  # 2. MULTIPART FILE UPLOAD CONFIGURATION
  # ===================================================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 20MB

  # ===================================================================
  # 3. JPA / HIBERNATE CONFIGURATION
  # ===================================================================
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ===================================================================
  # 4. FLYWAY MIGRATION CONFIGURATION
  # ===================================================================
  flyway:
    enabled: true
    encoding: UTF-8
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ===================================================================
  # 5. SMTP EMAIL CONFIGURATION
  # ===================================================================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:nckh.uni.noreply@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        from: ${MAIL_FROM:noreply@ou.edu.vn}

# ===================================================================
# HTTP: response compression (Tomcat gzip for selected MIME types)
# ===================================================================
server:
  compression:
    enabled: true
    mime-types: application/json,text/css,application/javascript
    min-response-size: 1024

# ===================================================================
# 5. APPLICATION-SPECIFIC PROPERTIES
# ===================================================================
app:
  # CORS: comma-separated browser origins. Override via CORS_ALLOWED_ORIGINS (twelve-factor).
  # Default supports local Vite/React dev servers and same-host Swagger UI when the env var is unset.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
  jwt:
    # Bắt buộc sử dụng chuỗi mã hóa chuẩn BASE64 (Dưới đây là chuỗi an toàn 512-bit)
    secret: ${JWT_SECRET}
    expiration: 86400000
    # Opaque refresh token TTL (default 7 days)
    refresh-expiration: 604800000

# ===================================================================
# 6. ACTUATOR / TELEMETRY
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# ===================================================================
# 7. SPRINGDOC CONFIGURATION
# ===================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    disable-swagger-default-url: true
    try-it-out-enabled: true
    filter: true
  packages-to-scan: com.researchsystem.backend.controller
  cache:
    disabled: true
  pre-loading-enabled: false
  show-actuator: false
  default-produces-media-type: application/json
