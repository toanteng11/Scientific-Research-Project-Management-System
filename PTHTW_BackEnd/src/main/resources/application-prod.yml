# ===================================================================
# PRODUCTION PROFILE — CORS origins MUST be supplied by the host environment.
# ===================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}

  data:
    web:
      pageable:
        max-page-size: 100

server:
  compression:
    enabled: true
    mime-types: application/json,text/css,application/javascript
    min-response-size: 1024

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

management:
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}
